name: Build

on:
  push:
    branches: [main, dev]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # ── Linux AppImage ────────────────────────────────────────────────────────
  linux:
    name: Linux (AppImage)
    runs-on: ubuntu-20.04      # 固定 20.04，保证 glibc 2.31 兼容性
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Qt6 和构建工具
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build \
            qt6-base-dev qt6-tools-dev \
            libgl1-mesa-dev librsvg2-bin \
            fuse libfuse2

      - name: 下载 linuxdeploy 工具
        run: |
          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage" \
               -O /usr/local/bin/linuxdeploy
          wget -q "https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage" \
               -O /usr/local/bin/linuxdeploy-plugin-qt
          chmod +x /usr/local/bin/linuxdeploy /usr/local/bin/linuxdeploy-plugin-qt

      - name: 构建 Release
        run: |
          cmake -B build/release -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build/release --parallel $(nproc)

      - name: 打包 AppImage
        run: |
          VERSION="${{ github.ref_name }}" bash scripts/build_appimage.sh
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1  # 在无 FUSE 的 CI 环境中也能运行

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-linux-appimage
          path: dist/*.AppImage
          if-no-files-found: warn

  # ── Windows EXE ───────────────────────────────────────────────────────────
  windows:
    name: Windows (EXE)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Qt6
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.6.*'
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          cache: true

      - name: 配置并编译
        run: |
          cmake -B build/windows -G "Visual Studio 17 2022" -A x64 `
                -DCMAKE_BUILD_TYPE=Release
          cmake --build build/windows --config Release --parallel

      - name: 打包运行时
        shell: cmd
        run: |
          mkdir dist\openclaw-portable
          copy build\windows\Release\openclaw.exe dist\openclaw-portable\
          windeployqt --release --no-translations --no-system-d3d-compiler `
            --dir dist\openclaw-portable build\windows\Release\openclaw.exe

      - name: 打包为 ZIP（便携版）
        run: |
          Compress-Archive -Path dist\openclaw-portable\* `
            -DestinationPath dist\openclaw-${{ github.ref_name }}-win64-portable.zip

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-windows-exe
          path: dist/*.zip
          if-no-files-found: warn

  # ── Release 发布 ──────────────────────────────────────────────────────────
  release:
    name: 发布 Release
    needs: [linux, windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
