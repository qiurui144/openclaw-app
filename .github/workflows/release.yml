name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux AppImage (${{ matrix.client.id }})
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        client:
          - id: default
            license_api: https://license.openclaw.cn/api
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Linux 系统依赖
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev \
            squashfs-tools fuse libfuse2

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: 准备客户端密钥
        run: |
          CLIENT_ID="${{ matrix.client.id }}"
          KEY_FILE="src-tauri/keys/${CLIENT_ID}_pub.pem"
          if [ -f "$KEY_FILE" ]; then
            cp "$KEY_FILE" src-tauri/keys/license_pub.pem
            echo "使用客户端 ${CLIENT_ID} 的 RSA 公钥"
          else
            echo "使用默认 RSA 公钥"
          fi

      - name: 构建 Lite AppImage
        # 不指定 --target，CI runner 默认 x86_64-unknown-linux-gnu，输出到 target/release/
        run: npm run tauri build
        env:
          OC_BUILD_BUNDLED: "0"
          OC_UPDATE_URL: ${{ secrets.OC_UPDATE_URL }}
          OC_CLIENT_ID: ${{ matrix.client.id }}
          OC_LICENSE_API: ${{ matrix.client.license_api }}

      - name: 暂存 Lite AppImage
        run: |
          CLIENT_ID="${{ matrix.client.id }}"
          SUFFIX=""
          if [ "$CLIENT_ID" != "default" ]; then SUFFIX="-${CLIENT_ID}"; fi
          mkdir -p _artifacts/linux
          for f in src-tauri/target/release/bundle/appimage/*.AppImage; do
            cp "$f" "_artifacts/linux/$(basename ${f%.AppImage})${SUFFIX}-lite.AppImage"
          done
          ls -lh _artifacts/linux/

      - name: 获取内嵌资源
        run: |
          chmod +x scripts/fetch_resources.sh
          bash scripts/fetch_resources.sh
        env:
          NODE_VERSION: "22.17.0"
          RESOURCES_DIR: resources/binaries

      - name: 构建 Full Bundle AppImage
        run: npm run tauri build -- --features bundled
        env:
          OC_BUILD_BUNDLED: "1"
          OC_UPDATE_URL: ${{ secrets.OC_UPDATE_URL }}
          OC_CLIENT_ID: ${{ matrix.client.id }}
          OC_LICENSE_API: ${{ matrix.client.license_api }}

      - name: 暂存 Full Bundle AppImage
        run: |
          CLIENT_ID="${{ matrix.client.id }}"
          SUFFIX=""
          if [ "$CLIENT_ID" != "default" ]; then SUFFIX="-${CLIENT_ID}"; fi
          for f in src-tauri/target/release/bundle/appimage/*.AppImage; do
            cp "$f" "_artifacts/linux/$(basename ${f%.AppImage})${SUFFIX}-full.AppImage"
          done
          ls -lh _artifacts/linux/

      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage-${{ matrix.client.id }}
          path: _artifacts/linux/*.AppImage

  build-windows:
    name: Build Windows NSIS (${{ matrix.client.id }})
    runs-on: windows-latest
    strategy:
      matrix:
        client:
          - id: default
            license_api: https://license.openclaw.cn/api
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: 准备客户端密钥
        shell: bash
        run: |
          CLIENT_ID="${{ matrix.client.id }}"
          KEY_FILE="src-tauri/keys/${CLIENT_ID}_pub.pem"
          if [ -f "$KEY_FILE" ]; then
            cp "$KEY_FILE" src-tauri/keys/license_pub.pem
            echo "使用客户端 ${CLIENT_ID} 的 RSA 公钥"
          else
            echo "使用默认 RSA 公钥"
          fi

      - name: 构建 Lite NSIS
        run: npm run tauri build
        env:
          OC_BUILD_BUNDLED: "0"
          OC_CLIENT_ID: ${{ matrix.client.id }}
          OC_LICENSE_API: ${{ matrix.client.license_api }}

      - name: 暂存 Lite NSIS
        shell: bash
        run: |
          CLIENT_ID="${{ matrix.client.id }}"
          SUFFIX=""
          if [ "$CLIENT_ID" != "default" ]; then SUFFIX="-${CLIENT_ID}"; fi
          mkdir -p _artifacts/windows
          for f in src-tauri/target/release/bundle/nsis/*.exe; do
            cp "$f" "_artifacts/windows/$(basename ${f%.exe})${SUFFIX}-lite.exe"
          done
          ls -lh _artifacts/windows/

      - name: 获取 Windows 内嵌资源
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p resources/binaries/windows
          NODE_VERSION="22.17.0"
          MIHOMO_VERSION="1.18.7"

          # Node.js
          echo "=== 下载 Node.js ${NODE_VERSION} ==="
          curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-win-x64.zip" -o node_win.zip
          unzip -p node_win.zip "node-v${NODE_VERSION}-win-x64/node.exe" > resources/binaries/windows/node.exe
          rm node_win.zip

          # openclaw fat tarball（含 node_modules，离线模式无需 npm install）
          echo "=== 构建 openclaw fat tarball ==="
          OC_VERSION=$(npm view openclaw version --registry https://registry.npmmirror.com 2>/dev/null || npm view openclaw version)
          OC_URL=$(npm view "openclaw@${OC_VERSION}" dist.tarball --registry https://registry.npmmirror.com 2>/dev/null || npm view "openclaw@${OC_VERSION}" dist.tarball)
          echo "openclaw@${OC_VERSION}: ${OC_URL}"
          FAT_TMP=$(mktemp -d)
          curl -fL "$OC_URL" -o "$FAT_TMP/raw.tgz"
          mkdir -p "$FAT_TMP/package"
          tar -xzf "$FAT_TMP/raw.tgz" -C "$FAT_TMP/package" --strip-components=1
          (cd "$FAT_TMP/package" && npm install --omit=dev --no-audit --no-fund --registry=https://registry.npmmirror.com)
          (cd "$FAT_TMP" && tar -czf openclaw.tgz package/)
          cp "$FAT_TMP/openclaw.tgz" resources/binaries/windows/openclaw.tgz
          rm -rf "$FAT_TMP"
          echo "fat tarball: $(du -sh resources/binaries/windows/openclaw.tgz | cut -f1)"

          # Mihomo（动态查 ZIP 内 exe 名，防止版本重命名导致 0 字节静默失败）
          echo "=== 下载 Mihomo ${MIHOMO_VERSION} ==="
          curl -fsSL "https://github.com/MetaCubeX/mihomo/releases/download/v${MIHOMO_VERSION}/mihomo-windows-amd64-v${MIHOMO_VERSION}.zip" -o mihomo_win.zip
          INNER_EXE=$(unzip -Z1 mihomo_win.zip | grep -i '\.exe$' | head -1)
          if [ -z "$INNER_EXE" ]; then
            echo "错误：mihomo ZIP 内未找到 .exe 文件" >&2; unzip -Z1 mihomo_win.zip >&2; exit 1
          fi
          echo "提取: $INNER_EXE"
          unzip -p mihomo_win.zip "$INNER_EXE" > resources/binaries/windows/mihomo.exe
          rm mihomo_win.zip

          # 验证所有文件 >1MB，防止空文件被内嵌进 Rust binary
          echo ""
          echo "=== 资源清单 ==="
          ls -lh resources/binaries/windows/
          for f in resources/binaries/windows/node.exe resources/binaries/windows/openclaw.tgz resources/binaries/windows/mihomo.exe; do
            bytes=$(wc -c < "$f")
            if [ "$bytes" -lt 1048576 ]; then
              echo "错误：$f 过小（${bytes}B），下载失败" >&2; exit 1
            fi
          done
          echo "所有资源验证通过"

      - name: 构建 Full Bundle NSIS
        run: npm run tauri build -- --features bundled
        env:
          OC_BUILD_BUNDLED: "1"
          OC_CLIENT_ID: ${{ matrix.client.id }}
          OC_LICENSE_API: ${{ matrix.client.license_api }}

      - name: 暂存 Full Bundle NSIS
        shell: bash
        run: |
          CLIENT_ID="${{ matrix.client.id }}"
          SUFFIX=""
          if [ "$CLIENT_ID" != "default" ]; then SUFFIX="-${CLIENT_ID}"; fi
          for f in src-tauri/target/release/bundle/nsis/*.exe; do
            cp "$f" "_artifacts/windows/$(basename ${f%.exe})${SUFFIX}-full.exe"
          done
          ls -lh _artifacts/windows/

      - uses: actions/upload-artifact@v4
        with:
          name: windows-nsis-${{ matrix.client.id }}
          path: _artifacts/windows/*.exe

  build-macos:
    name: Build macOS (${{ matrix.arch }}, ${{ matrix.client.id }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        arch:
          - arm64
          - x86_64
        client:
          - id: default
            license_api: https://license.openclaw.cn/api
        include:
          - arch: arm64
            runner: macos-latest
            target: aarch64-apple-darwin
          - arch: x86_64
            runner: macos-13
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: 准备客户端密钥
        run: |
          CLIENT_ID="${{ matrix.client.id }}"
          KEY_FILE="src-tauri/keys/${CLIENT_ID}_pub.pem"
          if [ -f "$KEY_FILE" ]; then
            cp "$KEY_FILE" src-tauri/keys/license_pub.pem
            echo "使用客户端 ${CLIENT_ID} 的 RSA 公钥"
          else
            echo "使用默认 RSA 公钥"
          fi

      - name: 构建 Lite DMG
        run: npm run tauri build -- --target ${{ matrix.target }} --bundles dmg
        env:
          OC_BUILD_BUNDLED: "0"
          OC_CLIENT_ID: ${{ matrix.client.id }}
          OC_LICENSE_API: ${{ matrix.client.license_api }}
          # 跳过签名（无开发者账号）
          APPLE_SIGNING_IDENTITY: "-"

      - name: 暂存 Lite DMG
        run: |
          CLIENT_ID="${{ matrix.client.id }}"
          SUFFIX=""
          if [ "$CLIENT_ID" != "default" ]; then SUFFIX="-${CLIENT_ID}"; fi
          mkdir -p _artifacts/macos
          for f in src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg; do
            cp "$f" "_artifacts/macos/$(basename ${f%.dmg})${SUFFIX}-${{ matrix.arch }}-lite.dmg"
          done
          ls -lh _artifacts/macos/

      - name: 获取内嵌资源
        run: |
          chmod +x scripts/fetch_resources.sh
          bash scripts/fetch_resources.sh
        env:
          NODE_VERSION: "22.17.0"
          RESOURCES_DIR: resources/binaries
          MACOS_NODE_ARCH: ${{ matrix.arch }}

      - name: 构建 Full Bundle DMG
        run: npm run tauri build -- --target ${{ matrix.target }} --bundles dmg --features bundled
        env:
          OC_BUILD_BUNDLED: "1"
          OC_CLIENT_ID: ${{ matrix.client.id }}
          OC_LICENSE_API: ${{ matrix.client.license_api }}
          APPLE_SIGNING_IDENTITY: "-"

      - name: 暂存 Full Bundle DMG
        run: |
          CLIENT_ID="${{ matrix.client.id }}"
          SUFFIX=""
          if [ "$CLIENT_ID" != "default" ]; then SUFFIX="-${CLIENT_ID}"; fi
          for f in src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg; do
            cp "$f" "_artifacts/macos/$(basename ${f%.dmg})${SUFFIX}-${{ matrix.arch }}-full.dmg"
          done
          ls -lh _artifacts/macos/

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-${{ matrix.arch }}-${{ matrix.client.id }}
          path: _artifacts/macos/*.dmg

  publish:
    name: Publish Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts/

      - name: 列出产物
        run: ls -lh artifacts/

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**
          body: |
            ## OpenClaw 部署向导 ${{ github.ref_name }}

            ### 下载

            | 平台 | 类型 | 下载 |
            |---|---|---|
            | Linux (x64) | Lite（在线） | `*-linux-x64-lite.AppImage` |
            | Linux (x64) | Full Bundle（离线） | `*-linux-x64-full.AppImage` |
            | Windows 10/11 | Lite（在线） | `*-windows-lite.exe` |
            | Windows 10/11 | Full Bundle（离线） | `*-windows-full.exe` |
            | macOS (Apple Silicon) | Lite（在线） | `*-arm64-lite.dmg` |
            | macOS (Apple Silicon) | Full Bundle（离线） | `*-arm64-full.dmg` |
            | macOS (Intel) | Lite（在线） | `*-x86_64-lite.dmg` |
            | macOS (Intel) | Full Bundle（离线） | `*-x86_64-full.dmg` |

            ### 最低系统要求
            - Linux: Ubuntu 22.04+（glibc >= 2.35）
            - Windows: Windows 10 1803+（WebView2 自动安装）
            - macOS: macOS 11 Big Sur+
