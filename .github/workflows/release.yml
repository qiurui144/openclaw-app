name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux AppImage
    # 使用 22.04 确保 glibc 2.35 兼容 22.04+，24.04 的 glibc 2.39 不兼容 22.04
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Linux 系统依赖
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev \
            squashfs-tools fuse libfuse2

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: 构建 Lite AppImage
        run: npm run tauri build -- --target x86_64-unknown-linux-gnu
        env:
          OC_BUILD_BUNDLED: "0"
          OC_UPDATE_URL: ${{ secrets.OC_UPDATE_URL }}

      - name: 获取内嵌资源
        run: |
          chmod +x scripts/fetch_resources.sh
          bash scripts/fetch_resources.sh
        env:
          NODE_VERSION: "22.17.0"
          RESOURCES_DIR: resources/binaries

      - name: 构建 Full Bundle AppImage
        run: npm run tauri build -- --features bundled
        env:
          OC_BUILD_BUNDLED: "1"
          OC_UPDATE_URL: ${{ secrets.OC_UPDATE_URL }}

      - name: 重命名产物
        run: |
          cd src-tauri/target/release/bundle/appimage/
          ls -lh *.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage

  build-windows:
    name: Build Windows NSIS
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: 构建 Lite NSIS
        run: npm run tauri build
        env:
          OC_BUILD_BUNDLED: "0"

      - name: 获取 Windows 内嵌资源
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p resources/binaries/windows
          NODE_VERSION="22.17.0"
          MIHOMO_VERSION="1.18.7"

          # Node.js
          echo "=== 下载 Node.js ${NODE_VERSION} ==="
          curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-win-x64.zip" -o node_win.zip
          unzip -p node_win.zip "node-v${NODE_VERSION}-win-x64/node.exe" > resources/binaries/windows/node.exe
          rm node_win.zip

          # openclaw.tgz
          echo "=== 下载 openclaw 服务包 ==="
          OC_VERSION=$(npm view openclaw version --registry https://registry.npmmirror.com 2>/dev/null || npm view openclaw version)
          OC_URL=$(npm view "openclaw@${OC_VERSION}" dist.tarball --registry https://registry.npmmirror.com 2>/dev/null || npm view "openclaw@${OC_VERSION}" dist.tarball)
          echo "openclaw@${OC_VERSION}: ${OC_URL}"
          curl -fL "$OC_URL" -o resources/binaries/windows/openclaw.tgz

          # Mihomo（动态查 ZIP 内 exe 名，防止版本重命名导致 0 字节静默失败）
          echo "=== 下载 Mihomo ${MIHOMO_VERSION} ==="
          curl -fsSL "https://github.com/MetaCubeX/mihomo/releases/download/v${MIHOMO_VERSION}/mihomo-windows-amd64-v${MIHOMO_VERSION}.zip" -o mihomo_win.zip
          INNER_EXE=$(unzip -Z1 mihomo_win.zip | grep -i '\.exe$' | head -1)
          if [ -z "$INNER_EXE" ]; then
            echo "错误：mihomo ZIP 内未找到 .exe 文件" >&2; unzip -Z1 mihomo_win.zip >&2; exit 1
          fi
          echo "提取: $INNER_EXE"
          unzip -p mihomo_win.zip "$INNER_EXE" > resources/binaries/windows/mihomo.exe
          rm mihomo_win.zip

          # 验证所有文件 >1MB，防止空文件被内嵌进 Rust binary
          echo ""
          echo "=== 资源清单 ==="
          ls -lh resources/binaries/windows/
          for f in resources/binaries/windows/node.exe resources/binaries/windows/openclaw.tgz resources/binaries/windows/mihomo.exe; do
            bytes=$(wc -c < "$f")
            if [ "$bytes" -lt 1048576 ]; then
              echo "错误：$f 过小（${bytes}B），下载失败" >&2; exit 1
            fi
          done
          echo "所有资源验证通过"

      - name: 构建 Full Bundle NSIS
        run: npm run tauri build -- --features bundled
        env:
          OC_BUILD_BUNDLED: "1"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe

  build-macos:
    name: Build macOS Bundle
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装打包依赖
        run: brew install coreutils

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 下载 openclaw.tgz
        run: |
          mkdir -p resources
          OC_VERSION=$(npm view openclaw version --registry https://registry.npmmirror.com 2>/dev/null || npm view openclaw version)
          OC_URL=$(npm view "openclaw@${OC_VERSION}" dist.tarball --registry https://registry.npmmirror.com 2>/dev/null || npm view "openclaw@${OC_VERSION}" dist.tarball)
          echo "下载 openclaw@${OC_VERSION}: ${OC_URL}"
          curl -fL "$OC_URL" -o resources/openclaw.tgz

      - name: 打包 macOS Full Bundle (arm64)
        run: bash scripts/macos/build_bundle.sh
        env:
          NODE_ARCH: arm64
          OUT_DIR: dist/macos

      - name: 打包 macOS Full Bundle (x86_64)
        run: bash scripts/macos/build_bundle.sh
        env:
          NODE_ARCH: x86_64
          OUT_DIR: dist/macos/x64

      - name: 打包 ZIP
        env:
          TAG: ${{ github.ref_name }}
        run: |
          cp scripts/macos/detect.sh scripts/macos/service.sh scripts/macos/clash.sh dist/macos/
          cd dist/macos
          zip -r "../../openclaw-wizard-${TAG}-macos-arm64.zip" install.command detect.sh service.sh clash.sh
          cd x64
          zip -r "../../../openclaw-wizard-${TAG}-macos-x64.zip" install.command detect.sh service.sh clash.sh

      - uses: actions/upload-artifact@v4
        with:
          name: macos-bundle
          path: "*.zip"

  publish:
    name: Publish Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts/

      - name: 列出产物
        run: ls -lh artifacts/

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**
          body: |
            ## OpenClaw 部署向导 ${{ github.ref_name }}

            ### 下载

            | 平台 | 类型 | 下载 |
            |---|---|---|
            | Linux (x64) | Lite（在线） | `*-linux-x64-lite.AppImage` |
            | Linux (x64) | Full Bundle（离线） | `*-linux-x64-full.AppImage` |
            | Windows 10/11 | Lite（在线） | `*-windows-lite.exe` |
            | Windows 10/11 | Full Bundle（离线） | `*-windows-full.exe` |
            | macOS (Apple Silicon) | 一键脚本 | `*-macos-arm64.zip` |
            | macOS (Intel) | 一键脚本 | `*-macos-x64.zip` |

            ### 最低系统要求
            - Linux: Ubuntu 22.04+（glibc >= 2.35）
            - Windows: Windows 10 1803+（WebView2 自动安装）
            - macOS: macOS 11 Big Sur+
